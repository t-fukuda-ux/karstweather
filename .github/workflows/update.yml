name: Update weather forecast

on:
  schedule:
    # 1時間ごと（JSTはUTC+9のため、時刻集合は変わらず毎時0分に実行される）
    # 2026-07-02: scheduled cronが22:07 UTC以降発火しなくなったため、本ファイルへの
    # 再pushでGitHub側のスケジュール再登録を促す（ローカルタスクスケジューラも保険として併用）
    - cron: '0 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: lowcloud.ps1 を実行（規定版）
        shell: pwsh
        run: ./lowcloud.ps1

      - name: lowcloud_ec.ps1 を実行（EC版）
        shell: pwsh
        run: ./lowcloud_ec.ps1

      - name: lowcloud_avg.ps1 を実行（平均版＝WEB公開のメイン）
        shell: pwsh
        run: ./lowcloud_avg.ps1

      - name: index.html を更新（GitHub Pagesのルート、平均版を反映）
        shell: pwsh
        run: Copy-Item lowcloud_avg.html index.html -Force

      - name: 変更があればコミット・push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lowcloud.html lowcloud_ec.html lowcloud_avg.html index.html
          if git diff --cached --quiet; then
            echo "変更なし。スキップします。"
          else
            git commit -m "update: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
