name: Update weather forecast

on:
  schedule:
    # 1時間ごと（JSTはUTC+9のため、時刻集合は変わらず毎時0分に実行される）
    - cron: '0 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: lowcloud.ps1 を実行して最新のHTML/CSVを生成
        shell: pwsh
        run: ./lowcloud.ps1

      - name: index.html を更新（GitHub Pagesのルート）
        shell: pwsh
        run: Copy-Item lowcloud.html index.html -Force

      - name: 変更があればコミット・push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lowcloud.html index.html
          if git diff --cached --quiet; then
            echo "変更なし。スキップします。"
          else
            git commit -m "update: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
