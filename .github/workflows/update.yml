name: Update weather forecast

on:
  schedule:
    # 毎時11分・41分。毎時0分はGitHub全体で最混雑のため回避（公式も遅延・ドロップを明記）。
    # scheduledトリガーは理由不明で発火しないことがあるため（2026-07-01/02に発生）、
    # 毎時2回スケジュールして片方がドロップされても更新が続く保険とする。
    # ローカルのタスクスケジューラ(publish.ps1)も二重化バックアップとして併用。
    - cron: '11,41 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

# 遅延したschedule実行が重なった場合の多重起動を防ぐ（後発は先発の完了を待つ）
concurrency:
  group: update-weather
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: 3版すべて生成（規定/EC/平均、1版失敗でも他は継続）
        shell: pwsh
        run: ./generate_all.ps1

      - name: 変更があればコミット・push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lowcloud.html lowcloud_ec.html lowcloud_avg.html index.html
          if git diff --cached --quiet; then
            echo "変更なし。スキップします。"
            exit 0
          fi
          git commit -m "update: $(date -u +'%Y-%m-%d %H:%M UTC')"
          # ローカルタスクのpushと競合した場合に備え、rebaseして最大3回再試行する。
          # rebase中の -X theirs は「再適用する自分のコミット側」＝今生成した最新HTMLを優先する。
          for i in 1 2 3; do
            if git pull --rebase -X theirs origin main && git push origin main; then
              exit 0
            fi
            echo "push失敗（${i}回目）。10秒後に再試行します。"
            git rebase --abort 2>/dev/null || true
            sleep 10
          done
          echo "pushに3回失敗しました。"
          exit 1
